name: Deploy to EC2

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_PUBLIC_IP }} << 'EOF'
          cd AI-Branding-Solution
          git pull origin production
          npm install
          npm run build
          # Use pm2 to manage the application
          # Check if the app is running and stop it if it is
          if pm2 list | grep -q "frontend_ai_branding"; then
            pm2 stop frontend_ai_branding
          fi
          pm2 start npm --name "frontend_ai_branding" -- run start -- -H 0.0.0.0 -p 4100
          pm2 save  # Save the process list
          EOF